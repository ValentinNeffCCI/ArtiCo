services:
  db:
    container_name: artico-db
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_datas:/var/lib/postgresql/data
    networks:
      - connectDB

  backend:
    container_name: artico-backend
    image: ${DOCKERHUB_USERNAME}/artico-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - connectDB
      - client_server

  client:
    container_name: artico-client
    image: ${DOCKERHUB_USERNAME}/artico-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/artico/certs:/usr/share/nginx/config:ro
    depends_on:
      - backend
    networks:
      - client_server

networks:
  connectDB:
    driver: bridge
  client_server:
    driver: bridge
