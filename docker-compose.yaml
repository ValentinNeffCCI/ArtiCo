services:
  db:
    container_name: artico-db
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_datas:/var/lib/postgresql
    networks:
      - connectDB

  backend:
    container_name: artico-backend
    restart: unless-stopped
    build:
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: dev
    volumes:
      - ./API:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - connectDB
      - client_server

  client:
    container_name: artico-client
    build:
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "${LOCAL_PORT}:80"
    volumes:
      - ./Frontend:/app
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - client_server

volumes:
  postgres_datas:

networks:
  connectDB:
    driver: bridge
  client_server:
    driver: bridge
