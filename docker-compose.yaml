services:
  db:
    container_name: artico-db
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_datas:/var/lib/postgresql
    networks:
      - connectDB

  logs-db:
    container_name: artico-logs-db
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - ./mongo_datas:/data/db
    networks:
      - connectDB

  backend:
    container_name: artico-backend
    restart: unless-stopped
    build:
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: dev
    ports:
      - "${PORT}:3000"
    volumes:
      - ./API:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      logs-db:
        condition: service_healthy
    networks:
      - connectDB
      - client_server

  client:
    container_name: artico-client
    build:
      dockerfile: docker/frontend/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_PROXY_TARGET: http://backend:3000
      FRONTEND_PORT: ${LOCAL_PORT}
    ports:
      - "${LOCAL_PORT}:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - client_server

volumes:
  postgres_datas:

networks:
  connectDB:
    driver: bridge
  client_server:
    driver: bridge
