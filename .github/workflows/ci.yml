name: CI

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: Tests API (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: API/package-lock.json
      - run: npm ci
      - run: npm test

  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: /api

  build-images:
    name: Build images de prod (build only, sans certs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Préparer un .env factice (build uniquement)
        run: cp .env.example .env
      - name: Build des trois images
        run: docker compose -f docker-compose.prod.yaml build
