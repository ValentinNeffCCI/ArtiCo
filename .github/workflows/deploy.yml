name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-api:
    name: Tests API (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: API/package-lock.json
      - run: npm ci
      - run: npm test

  build-push:
    name: Build & push images (Docker Hub)
    needs: [test-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/artico-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/artico-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile.prod
          build-args: |
            VITE_API_URL=/api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/artico-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/artico-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  copy_compose:
    name: Copy compose file
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.deploy.yml"
          target: "${{ secrets.DEPLOY_PATH }}/docker-compose.deploy.yml"

  deploy:
    name: Déploiement SSH
    needs: [copy_compose]
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: PROD_ENV,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG
          script: |
            set -e
            mkdir -p {{ secrets.DEPLOY_PATH }}
            cd {{ secrets.DEPLOY_PATH }}

            # Écrit le .env de prod depuis le secret, puis injecte le namespace + tag d'image.
            printf '%s\n' "$PROD_ENV" > .env
            echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> .env
            echo "IMAGE_TAG=$IMAGE_TAG" >> .env

            # Login Docker Hub pour tirer les images, pull, démarrage, nettoyage.
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose -f docker-compose.deploy.yaml pull
            docker compose -f docker-compose.deploy.yaml up -d
            docker logout
            docker image prune -f
