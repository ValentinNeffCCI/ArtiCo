services:
  db:
    container_name: artico-db
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_datas:/var/lib/postgresql/data
    networks:
      - connectDB

  logs-db:
    container_name: artico-logs-db
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - ./mongo_datas:/data/db
    networks:
      - connectDB

  backend:
    container_name: artico-backend
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      logs-db:
        condition: service_healthy
    networks:
      - connectDB
      - client_server

  client:
    container_name: artico-client
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/artico/certs:/usr/share/nginx/config:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - client_server

networks:
  connectDB:
    driver: bridge
  client_server:
    driver: bridge
