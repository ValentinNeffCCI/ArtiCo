server {
        listen 80;
        server_name valentinneff.dev www.valentinneff.dev;
        return 301 https://$host$request_uri;
}

server {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:3000;

        listen 443 ssl;
        server_tokens off;
        server_name valentinneff.dev www.valentinneff.dev;
        ssl_certificate /usr/share/nginx/config/fullchain.pem;
        ssl_certificate_key /usr/share/nginx/config/privkey.pem;
        root /usr/share/nginx/html/;
        index index.html;

        # D'abord les uploads pour les afficher
        location /uploads/ {
                proxy_pass $backend;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
                proxy_pass $backend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Cookie $http_cookie;
                proxy_redirect off;
        }

        location / {
                try_files $uri /index.html;
        }

        location ~* \.(js|css|ico)$ {
                expires 1y;
                add_header Cache-Control "public";
        }
}